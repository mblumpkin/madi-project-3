<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <title>Beach Sand Art</title>
  <meta name="description" content="This site will be a fun zen experience playing with sand with a beachy mood and ocean white noise.">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">

  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" href="./img/wave.webp">
  <!-- Place favicon.ico in the root directory -->

  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">

  <meta name="theme-color" content="#fafafa">
</head>

<body>

<div id="startOverlay">
  <div class="startBox">
    <h2>Beach Sand Art</h2>
    <p>
      Click and drag to create your own sand art.<br>
      Once you click, enjoy the sounds of ocean waves.
    </p>
    <button id="enterBtn">Enter</button>
  </div>
</div>

<div class="ui">
  <div class="title">Painterly Sand Beach</div>
  <div class="controls">
    <label>Sand Color</label>
    <input type="color" id="colorPicker" value="#f4c27a" />

    <label>Flow</label>
    <input id="flowSlider" type="range" min="1" max="20" value="6">

    <button id="clear">Clear</button>
  </div>
</div>

<canvas id="bg"></canvas>
<canvas id="sand"></canvas>

<script src="js/main.js"></script>

</body>
</html>
